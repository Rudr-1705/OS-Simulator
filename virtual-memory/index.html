<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0" />

  <title>
    Virtual Memory — OS Simulator
  </title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com" />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet" />

  <link
    rel="stylesheet"
    href="../shared.css" />

  <link
    rel="stylesheet"
    href="./virtual-memory.css" />

</head>

<body>

  <nav class="topnav">

    <a
      href="../index.html"
      class="nav-back">

      ← OS Simulator

    </a>

    <div class="nav-center">

      <span class="nav-module-name">
        Virtual Memory
      </span>

    </div>

  </nav>



  <header class="module-header">

    <div class="module-header-content">

      <div class="module-header-meta">

        <span class="badge badge-blue">
          Memory
        </span>

        <span class="badge badge-gray">
          Demand Paging
        </span>

      </div>

      <h1 class="module-title">
        Virtual Memory
      </h1>

      <p class="module-desc">

        Demand paging,
        working set,
        thrashing,
        and swap-space simulation.

      </p>

    </div>

  </header>



  <main class="simulator-main container">


    <!-- GLOBAL INPUTS -->

    <div
      class="controls-panel"
      style="margin-bottom:1rem">

      <div class="controls-row">

        <input
          id="globalRefs"
          class="form-input"
          value="1 2 3 4 2 1 5 2 4 6 1" />

        <input
          id="globalFrames"
          class="form-input mono"
          type="number"
          value="4"
          style="width:100px" />

        <input
          id="globalWindow"
          class="form-input mono"
          type="number"
          value="4"
          style="width:100px" />

        <button
          id="runAll"
          class="btn btn-primary">

          Run Simulation

        </button>

      </div>

    </div>



    <!-- TABS -->

    <div class="tabs">

      <button
        class="tab-btn active"
        data-tab="demand">

        Demand Paging

      </button>

      <button
        class="tab-btn"
        data-tab="working">

        Working Set

      </button>

      <button
        class="tab-btn"
        data-tab="thrash">

        Thrashing Curve

      </button>

      <button
        class="tab-btn"
        data-tab="swap">

        Swap Space

      </button>

    </div>



    <!-- DEMAND PAGING -->

    <div
      class="controls-panel"
      id="vm-demand">

      <div
        id="vmDemandViz"
        class="viz">

      </div>

    </div>



    <!-- WORKING SET -->

    <div
      class="controls-panel"
      id="vm-working"
      style="display:none">

      <div
        id="wsViz"
        class="viz">

      </div>

    </div>



    <!-- THRASHING -->

    <div
      class="controls-panel"
      id="vm-thrash"
      style="display:none">

      <canvas
        id="thrashCv"
        width="900"
        height="320">

      </canvas>

    </div>



    <!-- SWAP SPACE -->

    <div
      class="controls-panel"
      id="vm-swap"
      style="display:none">

      <div
        id="swapViz"
        class="viz">

      </div>

    </div>

  </main>



  <div id="toast-container"></div>

  <script src="../shared.js"></script>

  <script src="./virtual-memory.js"></script>

</body>

</html>
